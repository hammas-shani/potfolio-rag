<script id="mermaid-src" type="text/vnd.mermaid" title="AI RAG Architecture Flow">
graph TD
    US(("User")):::normal --> UI["Chainlit UI"]:::normal
    
    subgraph "Ingestion Pipeline"
        GH["GitHub Repositories"]:::normal --> DS(["Data Sync Script"]):::normal
        DS --> LD[("Local Dataset")]:::normal
        LD --> TS(["Text Splitter & Embeddings"]):::normal
        TS --> VB[("Main Vector DB")]:::normal
    end

    subgraph "RAG Retrieval Flow"
        UI -- "Query" --> SC[("Semantic Cache DB")]:::normal
        SC -- "Cache Hit" --> UI
        SC -- "Cache Miss" --> VB
        VB -- "Context" --> LLM(["LLM / RAG Chain"]):::normal
        LLM -- "Result" --> SC
        SC -- "Final Response" --> UI
    end
</script>

<script>
/**
 * AI RAG Architecture Visualization
 * Logic: Handles state mapping and UI updates when Mermaid nodes are clicked.
 */

// Define descriptions for the inspection panel (Editorial Details)
const NODE_INFO = {
    "User": {
        label: "End User",
        desc: "The entry point of the system. Users provide natural language queries which are processed through the frontend UI."
    },
    "Chainlit UI": {
        label: "Frontend UI",
        desc: "A Python-based interface (Chainlit) that orchestrates the communication between the User, the Semantic Cache, and the LLM."
    },
    "GitHub Repositories": {
        label: "Data Source",
        desc: "The original source of knowledge. The RAG system pulls documentation and code from these repositories to stay up-to-date."
    },
    "Data Sync Script": {
        label: "Ingestion Script",
        desc: "An automated process (Python/API) that periodically syncs data from GitHub to local storage, ensuring the AI has the latest information."
    },
    "Local Dataset": {
        label: "Local Storage",
        desc: "Intermediary storage for raw .txt or .md files before they are processed into a format the AI can understand."
    },
    "Text Splitter & Embeddings": {
        label: "Processor",
        desc: "Uses models like HuggingFace to break large documents into 'chunks' and convert them into numerical vectors (embeddings)."
    },
    "Main Vector DB": {
        label: "Vector Database",
        desc: "A Chroma SQLite database that stores embeddings. It allows the system to find relevant document chunks using semantic similarity search."
    },
    "Semantic Cache DB": {
        label: "Cache Layer",
        desc: "Stores previous query-answer pairs. If a new query is semantically similar to a previous one, it returns the cached result, saving LLM costs."
    },
    "LLM / RAG Chain": {
        label: "LLM (Llama-3.1)",
        desc: "The core intelligence (Groq Llama-3.1). It receives retrieved context and the user query to synthesize a grounded, accurate response."
    }
};

const { state, ui } = WH.createApp({
    title: "AI RAG Architecture Flow",
    params: {},
    editorial: {
        hud: [
            { label: "Selected Node", value: "None" }
        ]
    },
    // The editorialMapping automatically connects Mermaid clicks to the UI panel
    editorialMapping: Object.keys(NODE_INFO).reduce((acc, key) => {
        acc[key] = {
            value: NODE_INFO[key].label,
            text: NODE_INFO[key].desc
        };
        return acc;
    }, {})
});

// Internal state to track the selection for HUD updates
state.selectedNode = "None";

/**
 * Subscribe to the internal selection change to update the HUD.
 * The shell's Mermaid engine automatically updates state.selection when a node is clicked.
 */
state._subscribe('selection', (val) => {
    if (val && NODE_INFO[val]) {
        state.selectedNode = NODE_INFO[val].label;
    } else {
        state.selectedNode = "None";
    }
    
    ui.setEditorial({
        hud: [
            { label: "Selected Node", value: state.selectedNode }
        ]
    });
});
