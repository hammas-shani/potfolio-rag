name: Auto Fetch New GitHub Repos

on:
  schedule:
    - cron: '0 0 * * *' # Yeh har raat 12 baje khud chalega
  workflow_dispatch: # Is se aap isay manually bhi chala sakte hain button daba kar

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Bot ko file save karne ki ijazat

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Auto-Fetch Script
        run: python update_portfolio.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/portfolio.md
          git commit -m "Auto-added new GitHub repositories to portfolio" || exit 0
          git push
